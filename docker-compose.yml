services:
  db:
    image: postgres:15
    container_name: canvax-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: canvax
    volumes:
      - canvax-db-data:/var/lib/postgresql/data

volumes:
  canvax-db-data:
    name: canvax-db-data
